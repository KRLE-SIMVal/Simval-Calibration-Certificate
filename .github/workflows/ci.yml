name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  schedule:
    # Full quarterly regression run on Jan 1, Apr 1, Jul 1, and Oct 1.
    - cron: "0 0 1 1,4,7,10 *"
  workflow_dispatch:

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -e ".[api,test]"

      - name: Select validation evidence directory
        shell: bash
        run: |
          run_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "SIMVAL_RUN_STARTED_AT=${run_at}" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            year="$(date -u +%Y)"
            month="$(date -u +%m)"
            quarter=$(( (10#$month - 1) / 3 + 1 ))
            echo "SIMVAL_EVIDENCE_DIR=Docs/Validation/evidence/${year}/Q${quarter}" >> "$GITHUB_ENV"
          else
            echo "SIMVAL_EVIDENCE_DIR=Docs/Validation/evidence/latest" >> "$GITHUB_ENV"
          fi
          if [ "${SIMVAL_RUN_CONTROLLED_FIXTURE_TESTS:-0}" = "1" ]; then
            echo "SIMVAL_CONTROLLED_FIXTURES_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "SIMVAL_CONTROLLED_FIXTURES_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Run tests
        run: |
          mkdir -p "$SIMVAL_EVIDENCE_DIR"
          pytest --junitxml "$SIMVAL_EVIDENCE_DIR/pytest.xml"

      - name: Generate validation evidence report
        if: always()
        run: |
          evidence_dir="${SIMVAL_EVIDENCE_DIR:-Docs/Validation/evidence/latest}"
          run_started_at="${SIMVAL_RUN_STARTED_AT:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
          controlled_fixtures="${SIMVAL_CONTROLLED_FIXTURES_ENABLED:-false}"
          mkdir -p "$evidence_dir"
          python scripts/validation/generate_validation_report.py \
            --status "${{ job.status }}" \
            --objective "Automated regression run" \
            --test-suite "pytest" \
            --trigger-event "${{ github.event_name }}" \
            --run-id "${{ github.run_id }}" \
            --run-number "${{ github.run_number }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --actor "${{ github.actor }}" \
            --repository "${{ github.repository }}" \
            --ref "${{ github.ref }}" \
            --sha "${{ github.sha }}" \
            --run-started-at "$run_started_at" \
            --controlled-fixtures-enabled "$controlled_fixtures" \
            --evidence "junit=$evidence_dir/pytest.xml" \
            --evidence "artifact=validation-evidence-${{ github.run_id }}" \
            --output "$evidence_dir/validation-report.json"

      - name: Generate validation package
        if: always()
        run: |
          evidence_dir="${SIMVAL_EVIDENCE_DIR:-Docs/Validation/evidence/latest}"
          mkdir -p "$evidence_dir"
          if [ ! -f "$evidence_dir/pytest.xml" ]; then
            printf '<testsuite name="pytest" errors="1"></testsuite>\n' > "$evidence_dir/pytest.xml"
          fi
          python scripts/validation/generate_validation_package.py \
            --status "draft_pending_review" \
            --release-version "${{ github.sha }}" \
            --objective "Production readiness validation package" \
            --source-commit "${{ github.sha }}" \
            --iq "pyproject.toml" \
            --iq ".github/workflows/ci.yml" \
            --iq "Docs/P0/Architecture_And_Repository_Structure.md" \
            --iq "Docs/P0/Validation_And_Regression_Plan.md" \
            --oq "$evidence_dir/pytest.xml" \
            --oq "Docs/P0/Test_Case_Catalog.md" \
            --oq "Docs/P0/Requirements_To_Test_Matrix.md" \
            --pq "$evidence_dir/validation-report.json" \
            --pq "Docs/P4/P4_Closeout.md" \
            --pq "Docs/P6/P6_Implementation_Log.md" \
            --pq "Docs/P7/P7_Implementation_Log.md" \
            --pq "Docs/P8/P8_Implementation_Log.md" \
            --known-limitation "Controlled confidential fixture execution remains opt-in." \
            --known-limitation "Full equipment-library data population is a manual production-readiness activity." \
            --known-limitation "PDF/A and digital-signature policy remains pending." \
            --known-limitation "Human QA/laboratory approval is required before production use." \
            --output-dir "$evidence_dir/validation-package"

      - name: Generate scheduled regression deviation
        if: ${{ failure() && github.event_name == 'schedule' }}
        run: |
          evidence_dir="${SIMVAL_EVIDENCE_DIR:-Docs/Validation/evidence/latest}"
          run_started_at="${SIMVAL_RUN_STARTED_AT:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
          mkdir -p "$evidence_dir"
          python scripts/validation/generate_regression_deviation.py \
            --status "${{ job.status }}" \
            --objective "Automated regression run" \
            --test-suite "pytest" \
            --trigger-event "${{ github.event_name }}" \
            --repository "${{ github.repository }}" \
            --ref "${{ github.ref }}" \
            --sha "${{ github.sha }}" \
            --run-id "${{ github.run_id }}" \
            --run-number "${{ github.run_number }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --run-started-at "$run_started_at" \
            --evidence "junit=$evidence_dir/pytest.xml" \
            --evidence "validation_report=$evidence_dir/validation-report.json" \
            --evidence "artifact=validation-evidence-${{ github.run_id }}" \
            --json-output "$evidence_dir/quarterly-regression-deviation.json" \
            --markdown-output "$evidence_dir/quarterly-regression-deviation.md"

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: validation-evidence-${{ github.run_id }}
          path: Docs/Validation/evidence
          if-no-files-found: ignore

  scheduled-regression-issue:
    name: Open scheduled regression deviation issue
    needs: test
    if: ${{ github.event_name == 'schedule' && needs.test.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Download retained validation evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: validation-evidence-${{ github.run_id }}
          path: downloaded-validation-evidence

      - name: Select scheduled evidence directory
        shell: bash
        run: |
          year="$(date -u +%Y)"
          month="$(date -u +%m)"
          quarter=$(( (10#$month - 1) / 3 + 1 ))
          echo "SIMVAL_EVIDENCE_DIR=downloaded-validation-evidence/${year}/Q${quarter}" >> "$GITHUB_ENV"

      - name: Open scheduled regression deviation issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const evidenceDir = process.env.SIMVAL_EVIDENCE_DIR;
            const body = fs.readFileSync(
              `${evidenceDir}/quarterly-regression-deviation.md`,
              "utf8",
            );
            const title = `Quarterly regression deviation: run ${context.runId}`;
            await github.rest.issues.create({ owner, repo, title, body });
