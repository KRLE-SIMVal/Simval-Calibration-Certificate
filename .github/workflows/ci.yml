name: CI

permissions:
  contents: read
  issues: write

on:
  push:
  pull_request:
  schedule:
    # Full quarterly regression run on Jan 1, Apr 1, Jul 1, and Oct 1.
    - cron: "0 0 1 1,4,7,10 *"
  workflow_dispatch:

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -e ".[api,test]"

      - name: Select validation evidence directory
        shell: bash
        run: |
          run_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "SIMVAL_RUN_STARTED_AT=${run_at}" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            year="$(date -u +%Y)"
            month="$(date -u +%m)"
            quarter=$(( (10#$month - 1) / 3 + 1 ))
            echo "SIMVAL_EVIDENCE_DIR=Docs/Validation/evidence/${year}/Q${quarter}" >> "$GITHUB_ENV"
          else
            echo "SIMVAL_EVIDENCE_DIR=Docs/Validation/evidence/latest" >> "$GITHUB_ENV"
          fi
          if [ "${SIMVAL_RUN_CONTROLLED_FIXTURE_TESTS:-0}" = "1" ]; then
            echo "SIMVAL_CONTROLLED_FIXTURES_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "SIMVAL_CONTROLLED_FIXTURES_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Run tests
        run: |
          mkdir -p "$SIMVAL_EVIDENCE_DIR"
          pytest --junitxml "$SIMVAL_EVIDENCE_DIR/pytest.xml"

      - name: Generate validation evidence report
        if: always()
        run: |
          evidence_dir="${SIMVAL_EVIDENCE_DIR:-Docs/Validation/evidence/latest}"
          run_started_at="${SIMVAL_RUN_STARTED_AT:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
          controlled_fixtures="${SIMVAL_CONTROLLED_FIXTURES_ENABLED:-false}"
          mkdir -p "$evidence_dir"
          python scripts/validation/generate_validation_report.py \
            --status "${{ job.status }}" \
            --objective "Automated regression run" \
            --test-suite "pytest" \
            --trigger-event "${{ github.event_name }}" \
            --run-id "${{ github.run_id }}" \
            --run-number "${{ github.run_number }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --actor "${{ github.actor }}" \
            --repository "${{ github.repository }}" \
            --ref "${{ github.ref }}" \
            --sha "${{ github.sha }}" \
            --run-started-at "$run_started_at" \
            --controlled-fixtures-enabled "$controlled_fixtures" \
            --evidence "junit=$evidence_dir/pytest.xml" \
            --evidence "artifact=validation-evidence-${{ github.run_id }}" \
            --output "$evidence_dir/validation-report.json"

      - name: Generate scheduled regression deviation
        if: ${{ failure() && github.event_name == 'schedule' }}
        run: |
          evidence_dir="${SIMVAL_EVIDENCE_DIR:-Docs/Validation/evidence/latest}"
          run_started_at="${SIMVAL_RUN_STARTED_AT:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
          mkdir -p "$evidence_dir"
          python scripts/validation/generate_regression_deviation.py \
            --status "${{ job.status }}" \
            --objective "Automated regression run" \
            --test-suite "pytest" \
            --trigger-event "${{ github.event_name }}" \
            --repository "${{ github.repository }}" \
            --ref "${{ github.ref }}" \
            --sha "${{ github.sha }}" \
            --run-id "${{ github.run_id }}" \
            --run-number "${{ github.run_number }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --run-started-at "$run_started_at" \
            --evidence "junit=$evidence_dir/pytest.xml" \
            --evidence "validation_report=$evidence_dir/validation-report.json" \
            --evidence "artifact=validation-evidence-${{ github.run_id }}" \
            --json-output "$evidence_dir/quarterly-regression-deviation.json" \
            --markdown-output "$evidence_dir/quarterly-regression-deviation.md"

      - name: Open scheduled regression deviation issue
        if: ${{ failure() && github.event_name == 'schedule' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const evidenceDir =
              process.env.SIMVAL_EVIDENCE_DIR || "Docs/Validation/evidence/latest";
            const body = fs.readFileSync(
              `${evidenceDir}/quarterly-regression-deviation.md`,
              "utf8",
            );
            const title = `Quarterly regression deviation: run ${context.runId}`;
            await github.rest.issues.create({ owner, repo, title, body });

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-evidence-${{ github.run_id }}
          path: Docs/Validation/evidence
          if-no-files-found: ignore
